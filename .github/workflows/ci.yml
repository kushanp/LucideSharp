name: Build, Pack & Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  PROJECT_PATH: src/LucideSharp.WinForms/LucideSharp.WinForms.csproj
  SOLUTION_PATH: LucideSharp.slnx
  ARTIFACTS_DIR: artifacts
  SYMBOL_VALIDATOR_PATH: tools/SymbolValidator/SymbolValidator.csproj

jobs:
  build:
    name: Build & Pack
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            6.0.x

      - name: Determine package version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
            $version = "${{ github.ref_name }}".Substring(1)
          } else {
            $version = (Select-Xml -Path $env:PROJECT_PATH -XPath '//Version' | Select-Object -First 1).Node.InnerText
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Package version: $version"

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Pack NuGet package
        run: >
          dotnet pack ${{ env.PROJECT_PATH }}
          --configuration Release
          --no-restore
          --output ${{ env.ARTIFACTS_DIR }}
          -p:Version=${{ steps.version.outputs.version }}
          -p:PackageVersion=${{ steps.version.outputs.version }}
          -p:ContinuousIntegrationBuild=true

      - name: Build solution (verify samples)
        run: >
          dotnet build ${{ env.SOLUTION_PATH }}
          --configuration Release
          --no-restore
          -p:Version=${{ steps.version.outputs.version }}
          -p:PackageVersion=${{ steps.version.outputs.version }}
          -p:ContinuousIntegrationBuild=true

      - name: Validate symbol package
        shell: pwsh
        run: |
          $nupkg = Get-ChildItem -Path "${{ env.ARTIFACTS_DIR }}" -Filter "*.nupkg" -File | Select-Object -First 1
          $snupkg = Get-ChildItem -Path "${{ env.ARTIFACTS_DIR }}" -Filter "*.snupkg" -File | Select-Object -First 1

          if (-not $nupkg -or -not $snupkg) {
            throw "Expected both .nupkg and .snupkg in ${{ env.ARTIFACTS_DIR }}."
          }

          dotnet run --project ${{ env.SYMBOL_VALIDATOR_PATH }} -- `
            $nupkg.FullName `
            $snupkg.FullName

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ${{ env.ARTIFACTS_DIR }}/
          if-no-files-found: error

  publish:
    name: Publish to NuGet.org
    runs-on: windows-latest
    needs: build
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ${{ env.ARTIFACTS_DIR }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish to NuGet.org
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw "NUGET_API_KEY secret is not configured."
          }

          $nupkg = Get-ChildItem -Path "${{ env.ARTIFACTS_DIR }}" -Filter "*.nupkg" -File | Select-Object -First 1
          $snupkg = Get-ChildItem -Path "${{ env.ARTIFACTS_DIR }}" -Filter "*.snupkg" -File | Select-Object -First 1

          if (-not $nupkg -or -not $snupkg) {
            throw "No NuGet package files found to publish."
          }

          Write-Host "Listing ${{ env.ARTIFACTS_DIR }}"
          Get-ChildItem -Path "${{ env.ARTIFACTS_DIR }}" -File | Format-Table Name, Length, FullName

          Write-Host "Pushing $($nupkg.FullName)"
          $pushOutput = dotnet nuget push $nupkg.FullName `
            --api-key $env:NUGET_API_KEY `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate 2>&1 | Out-String

          Write-Host $pushOutput

          if ($pushOutput -match '409|already exists|Conflict|already been pushed') {
            Write-Warning "Main package already exists on NuGet.org. Skipping symbol package push to avoid PDB/DLL mismatch."
            exit 0
          }

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to push $($nupkg.Name)."
          }

          Write-Host "Pushing $($snupkg.FullName)"
          dotnet nuget push $snupkg.FullName `
            --api-key $env:NUGET_API_KEY `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to push $($snupkg.Name)."
          }