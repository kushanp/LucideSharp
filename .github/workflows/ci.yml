name: Build, Pack & Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  PROJECT_PATH: src/LucideSharp.WinForms/LucideSharp.WinForms.csproj
  SOLUTION_PATH: LucideSharp.slnx
  ARTIFACTS_DIR: artifacts

jobs:
  build:
    name: Build & Pack
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            6.0.x

      - name: Determine package version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
            $version = "${{ github.ref_name }}".Substring(1)
          } else {
            $version = (Select-Xml -Path $env:PROJECT_PATH -XPath '//Version' | Select-Object -First 1).Node.InnerText
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Package version: $version"

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: >
          dotnet build ${{ env.SOLUTION_PATH }}
          --configuration Release
          --no-restore
          -p:Version=${{ steps.version.outputs.version }}
          -p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Pack NuGet package
        run: >
          dotnet pack ${{ env.PROJECT_PATH }}
          --configuration Release
          --no-build
          --output ${{ env.ARTIFACTS_DIR }}
          -p:Version=${{ steps.version.outputs.version }}
          -p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ${{ env.ARTIFACTS_DIR }}/*.nupkg
          if-no-files-found: error

      - name: Upload symbol packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-symbols
          path: ${{ env.ARTIFACTS_DIR }}/*.snupkg
          if-no-files-found: error

  publish:
    name: Publish to NuGet.org
    runs-on: windows-latest
    needs: build
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ${{ env.ARTIFACTS_DIR }}

      - name: Download symbol packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-symbols
          path: ${{ env.ARTIFACTS_DIR }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push "${{ env.ARTIFACTS_DIR }}\*.nupkg" `
            --api-key "${{ secrets.NUGET_API_KEY }}" `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate

          dotnet nuget push "${{ env.ARTIFACTS_DIR }}\*.snupkg" `
            --api-key "${{ secrets.NUGET_API_KEY }}" `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate